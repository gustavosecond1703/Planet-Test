<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scientific Earth</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:Inter,Arial,sans-serif;
    color:white;
}

canvas{
    display:block;
}

/* TITLE */

.title{
    position:absolute;
    top:24px;
    width:100%;
    text-align:center;
    z-index:100;
    pointer-events:none;
}

.title h1{
    font-size:40px;
    letter-spacing:8px;
    font-weight:700;
}

.title p{
    margin-top:8px;
    opacity:0.65;
    letter-spacing:2px;
    font-size:13px;
}

/* HUD */

.hud{
    position:absolute;
    top:110px;
    left:22px;
    width:220px;
    padding:18px;
    border-radius:18px;
    background:rgba(10,10,10,0.45);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    z-index:90;
}

.hud h3{
    margin-bottom:14px;
    font-size:13px;
    letter-spacing:2px;
    opacity:0.8;
}

.hud div{
    margin-bottom:10px;
    font-size:13px;
    color:#d2d8de;
}

/* INFO */

.info{
    position:absolute;
    top:110px;
    right:25px;
    width:390px;
    max-height:76vh;
    overflow:auto;
    padding:26px;
    border-radius:22px;
    display:none;
    z-index:100;
    background:rgba(10,10,10,0.55);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
}

.info h2{
    font-size:30px;
    margin-bottom:18px;
}

.info h3{
    margin-top:18px;
    margin-bottom:10px;
    font-size:14px;
    opacity:0.72;
    letter-spacing:1px;
}

.info p{
    line-height:1.8;
    opacity:0.92;
    font-size:14px;
}

/* BUTTON */

.info button{
    margin-top:18px;
    padding:8px 13px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.06);
    color:white;
    cursor:pointer;
    transition:0.25s;
    font-size:12px;
    border:1px solid rgba(255,255,255,0.08);
}

.info button:hover{
    background:rgba(255,255,255,0.12);
}

/* AUDIO PLAYER */

.audio-player{
    margin-top:22px;
    padding:14px;
    border-radius:16px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
}

.audio-player button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.06);
    color:white;
    cursor:pointer;
    transition:0.25s;
    font-size:13px;
    margin-bottom:14px;
}

.audio-player button:hover{
    background:rgba(255,255,255,0.12);
}

.audio-progress{
    width:100%;
    height:6px;
    border-radius:999px;
    overflow:hidden;
    background:rgba(255,255,255,0.08);
    margin-bottom:10px;
}

.audio-bar{
    width:0%;
    height:100%;
    background:#9ee7ff;
    transition:0.1s;
}

#audioTime{
    font-size:12px;
    opacity:0.7;
}

/* FULLSCREEN VIDEO */

.viewer{
    position:fixed;
    inset:0;
    opacity:0;
    pointer-events:none;
    transition:1s;
    z-index:40;
}

.viewer.active{
    opacity:1;
    pointer-events:auto;
}

.viewer video{
    width:100%;
    height:100%;
    object-fit:cover;
    animation:zoomVideo 18s infinite alternate ease-in-out;
}

.viewer::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        rgba(0,0,0,0.95),
        rgba(0,0,0,0.1)
    );
}

/* TOOLTIP */

.tooltip{
    position:absolute;
    z-index:150;
    padding:10px 14px;
    border-radius:12px;
    background:rgba(0,0,0,0.72);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.08);
    font-size:12px;
    pointer-events:none;
    opacity:0;
    transition:0.2s;
}

/* VIDEO ZOOM */

@keyframes zoomVideo{

    0%{
        transform:scale(1);
    }

    100%{
        transform:scale(1.12);
    }

}

@media(max-width:768px){

    .title h1{
        font-size:28px;
    }

    .info{
        width:90%;
        right:50%;
        transform:translateX(50%);
        top:auto;
        bottom:20px;
    }

}

</style>
</head>

<body>

<div class="title">
    <h1>SCIENTIFIC EARTH</h1>
    <p>INTERACTIVE SCIENTIFIC EXPLORATION</p>
</div>

<div class="hud">
    <h3>EARTH STATUS</h3>
    <div>CO2: 421 ppm</div>
    <div>Temperature: +1.2°C</div>
    <div>Oxygen: 20.9%</div>
    <div>Sea Level: +9cm</div>
    <div>Volcanoes: 1350</div>
</div>

<div class="info" id="infoBox"></div>

<div class="viewer" id="viewer">
    <video
        id="videoView"
        autoplay
        muted
        loop
        playsinline>
    </video>
</div>

<div class="tooltip" id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script>

/* SCENE */

const scene = new THREE.Scene();

/* CAMERA */

const camera = new THREE.PerspectiveCamera(
45,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,0,3);

/* RENDERER */

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setPixelRatio(window.devicePixelRatio);

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(renderer.domElement);

/* CONTROLS */

const controls = new THREE.OrbitControls(
camera,
renderer.domElement
);

controls.enableDamping = true;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.35;

/* LIGHT */

scene.add(
new THREE.AmbientLight(
0xffffff,
0.7
)
);

const directionalLight =
new THREE.DirectionalLight(
0xffffff,
1.4
);

directionalLight.position.set(5,3,5);

scene.add(directionalLight);

/* LOADER */

const loader = new THREE.TextureLoader();

/* EARTH */

const earth =
new THREE.Mesh(

    new THREE.SphereGeometry(
        1,
        128,
        128
    ),

    new THREE.MeshPhongMaterial({

        map:loader.load(
'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'
        ),

        shininess:10

    })

);

scene.add(earth);

/* CLOUDS */

const clouds =
new THREE.Mesh(

    new THREE.SphereGeometry(
        1.01,
        128,
        128
    ),

    new THREE.MeshPhongMaterial({

        map:loader.load(
'https://raw.githubusercontent.com/turban/webgl-earth/master/images/fair_clouds_4k.png'
        ),

        transparent:true,

        opacity:0.35

    })

);

earth.add(clouds);

/* STARS */

const stars =
new THREE.Mesh(

    new THREE.SphereGeometry(
        100,
        64,
        64
    ),

    new THREE.MeshBasicMaterial({

        map:loader.load(
'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/galaxy_starfield.png'
        ),

        side:THREE.BackSide

    })

);

scene.add(stars);

/* FACTS */

const facts = [

{
name:'Japan',
lat:36,
lng:138,
media:'tokyo.mp4',
audio:'japan.mp3',
pt:'O Japão é uma das regiões tecnologicamente mais avançadas do planeta.',
en:'Japan is one of the most technologically advanced regions on Earth.'
},

{
name:'Amazon Rainforest',
lat:-3,
lng:-60,
media:'amazon.mp4',
audio:'amazon.mp3',
pt:'A Amazônia é a maior floresta tropical do planeta.',
en:'The Amazon is the largest tropical rainforest on Earth.'
},

{
name:'Sahara Desert',
lat:23,
lng:13,
media:'sahara.mp4',
audio:'sahara.mp3',
pt:'O Saara é o maior deserto quente do mundo.',
en:'The Sahara is the largest hot desert in the world.'
},

{
name:'Iceland Volcanoes',
lat:64,
lng:-18,
media:'iceland.mp4',
audio:'iceland.mp3',
pt:'A Islândia possui intensa atividade vulcânica e geotérmica.',
en:'Iceland has intense volcanic and geothermal activity.'
},

{
name:'Northern Lights',
lat:69,
lng:18,
media:'aurora.mp4',
audio:'aurora.mp3',
pt:'A Aurora Boreal acontece devido às partículas solares.',
en:'The Northern Lights occur due to solar particles.'
},

{
name:'Himalayas',
lat:28,
lng:86,
media:'himalaya.mp4',
audio:'himalaya.mp3',
pt:'O Himalaia abriga o Monte Everest.',
en:'The Himalayas are home to Mount Everest.'
},

{
name:'Great Barrier Reef',
lat:-18,
lng:147,
media:'reef.mp4',
audio:'reef.mp3',
pt:'A Grande Barreira de Corais é o maior sistema de recifes do mundo.',
en:'The Great Barrier Reef is the largest coral reef system in the world.'
},

{
name:'Andes Mountains',
lat:-32,
lng:-70,
media:'andes.mp4',
audio:'andes.mp3',
pt:'Os Andes são a maior cadeia montanhosa continental da Terra.',
en:'The Andes are the longest continental mountain range on Earth.'
},

{
name:'Antarctica',
lat:-82,
lng:135,
media:'antarctica.mp4',
audio:'antarctica.mp3',
pt:'A Antártica contém cerca de 70% da água doce congelada da Terra.',
en:'Antarctica contains about 70% of Earth’s frozen freshwater.'
}

];

/* POSITION */

function latLngToVector3(lat,lng,r){

    const phi =
    (90-lat)*(Math.PI/180);

    const theta =
    (lng+180)*(Math.PI/180);

    return new THREE.Vector3(

        -r*Math.sin(phi)*Math.cos(theta),

        r*Math.cos(phi),

        r*Math.sin(phi)*Math.sin(theta)

    );

}

/* MARKERS */

const markers = [];

facts.forEach(f=>{

    const marker =
    new THREE.Mesh(

        new THREE.SphereGeometry(
            0.024,
            24,
            24
        ),

        new THREE.MeshBasicMaterial({
            color:0xaeefff
        })

    );

    marker.position.copy(
        latLngToVector3(
            f.lat,
            f.lng,
            1.035
        )
    );

    const glow =
    new THREE.Mesh(

        new THREE.SphereGeometry(
            0.055,
            24,
            24
        ),

        new THREE.MeshBasicMaterial({

            color:0x8be9fd,

            transparent:true,

            opacity:0.14

        })

    );

    marker.add(glow);

    const clickable =
    new THREE.Mesh(

        new THREE.SphereGeometry(
            0.08,
            24,
            24
        ),

        new THREE.MeshBasicMaterial({

            transparent:true,
            opacity:0

        })

    );

    marker.add(clickable);

    gsap.to(glow.scale,{

        x:1.5,
        y:1.5,
        z:1.5,

        duration:1.4,

        repeat:-1,

        yoyo:true

    });

    marker.userData = f;

    marker.clickable = clickable;

    earth.add(marker);

    markers.push(marker);

});

/* RAYCAST */

const raycaster =
new THREE.Raycaster();

const mouse =
new THREE.Vector2();

const tooltip =
document.getElementById('tooltip');

/* HOVER */

window.addEventListener('mousemove',e=>{

    mouse.x =
    (e.clientX/window.innerWidth)*2-1;

    mouse.y =
    -(e.clientY/window.innerHeight)*2+1;

    raycaster.setFromCamera(mouse,camera);

    const clickableObjects=[];

    markers.forEach(m=>{

        clickableObjects.push(m);
        clickableObjects.push(m.clickable);

    });

    const hit=
    raycaster.intersectObjects(
        clickableObjects,
        true
    );

    if(hit.length){

        document.body.style.cursor='pointer';

        const data =
        hit[0].object.parent.userData ||
        hit[0].object.userData;

        tooltip.style.opacity=1;

        tooltip.style.left=
        e.clientX+15+'px';

        tooltip.style.top=
        e.clientY+15+'px';

        tooltip.innerHTML=`
        <strong>${data.name}</strong>
        `;

    }else{

        document.body.style.cursor='default';

        tooltip.style.opacity=0;

    }

});

/* CLICK */

window.addEventListener('click',e=>{

    mouse.x =
    (e.clientX/window.innerWidth)*2-1;

    mouse.y =
    -(e.clientY/window.innerHeight)*2+1;

    raycaster.setFromCamera(mouse,camera);

    const clickableObjects=[];

    markers.forEach(m=>{

        clickableObjects.push(m);
        clickableObjects.push(m.clickable);

    });

    const hit=
    raycaster.intersectObjects(
        clickableObjects,
        true
    );

    if(hit.length){

        const obj =
        hit[0].object.parent.userData
        ? hit[0].object.parent
        : hit[0].object;

        const f=obj.userData;

        controls.autoRotate=false;

        window.clickedDirection =
        obj.position.clone().normalize();

        const target =
        window.clickedDirection.clone()
        .multiplyScalar(1.45);

        gsap.to(camera.position,{

            x:target.x,
            y:target.y,
            z:target.z,

            duration:2,

            ease:'power3.out',

            onUpdate:()=>{

                camera.lookAt(0,0,0);

            }

        });

        /* VIDEO */

        const viewer =
        document.getElementById('viewer');

        const video =
        document.getElementById('videoView');

        video.src=f.media;

        video.play();

        viewer.classList.add('active');

        /* INFO */

        setTimeout(()=>{

            const box=
            document.getElementById('infoBox');

            box.innerHTML=`

            <h2>${f.name}</h2>

            <h3>🇧🇷 Português</h3>

            <p>${f.pt}</p>

            <h3>🇺🇸 English</h3>

            <p>${f.en}</p>

            <div class="audio-player">

                <button id="playAudioBtn">
                    ▶ Play Narration
                </button>

                <div class="audio-progress">

                    <div class="audio-bar" id="audioBar"></div>

                </div>

                <span id="audioTime">0:00</span>

            </div>

            <button onclick="closeView()">
            Close
            </button>

            <audio id="narrationAudio" src="${f.audio}"></audio>

            `;

            box.style.display='block';

            /* AUDIO */

            const narrationAudio =
            document.getElementById('narrationAudio');

            const playBtn =
            document.getElementById('playAudioBtn');

            const audioBar =
            document.getElementById('audioBar');

            const audioTime =
            document.getElementById('audioTime');

            playBtn.onclick = ()=>{

                if(narrationAudio.paused){

                    narrationAudio.play();

                    playBtn.innerHTML =
                    '⏸ Pause Narration';

                }else{

                    narrationAudio.pause();

                    playBtn.innerHTML =
                    '▶ Play Narration';

                }

            };

            narrationAudio.addEventListener(
            'timeupdate',
            ()=>{

                const progress =
                (narrationAudio.currentTime /
                narrationAudio.duration)*100;

                audioBar.style.width =
                progress+'%';

                const minutes =
                Math.floor(
                narrationAudio.currentTime/60
                );

                const seconds =
                Math.floor(
                narrationAudio.currentTime%60
                );

                audioTime.innerHTML =
                minutes+':' +
                String(seconds).padStart(2,'0');

            });

            narrationAudio.addEventListener(
            'ended',
            ()=>{

                playBtn.innerHTML =
                '▶ Play Narration';

            });

        },700);

    }

});

/* CLOSE */

function closeView(){

    document.getElementById('viewer')
    .classList.remove('active');

    document.getElementById('infoBox')
    .style.display='none';

    document.getElementById('videoView')
    .pause();

    controls.autoRotate = false;

    const zoomOutPosition =
    window.clickedDirection.clone()
    .multiplyScalar(3);

    gsap.to(camera.position,{

        x:zoomOutPosition.x,
        y:zoomOutPosition.y,
        z:zoomOutPosition.z,

        duration:2.5,

        ease:'power3.inOut',

        onUpdate:()=>{

            camera.lookAt(0,0,0);

        },

        onComplete:()=>{

            controls.autoRotate = true;

        }

    });

}

/* LOOP */

function animate(){

    requestAnimationFrame(animate);

    earth.rotation.y += 0.0013;

    clouds.rotation.y += 0.0015;

    stars.rotation.y += 0.00008;

    controls.update();

    renderer.render(scene,camera);

}

animate();

/* RESIZE */

window.addEventListener('resize',()=>{

    camera.aspect=
    window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

</script>

</body>
</html>
